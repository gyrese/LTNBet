services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ltn-bet-app
    restart: always
    # Port HÔTE:CONTENEUR. Le 3000 hôte est déjà pris par une autre app → on publie sur 3008.
    # (Le conteneur écoute toujours sur 3000 en interne.)
    ports:
      - "3008:3000"
    volumes:
      - ./data:/app/data
    # Injecte TOUTES les clés (odds-api.io, API-Football, Football-Data, bookmakers) dans le conteneur.
    # ⚠️ Le fichier .env.local doit être présent à côté de ce docker-compose.yml sur le VPS.
    env_file:
      - .env.local
    environment:
      - PORT=3000
